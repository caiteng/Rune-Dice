name: Web Preview Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cat-night-watch-web-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot 4.5
        run: |
          set -euo pipefail
          mkdir -p .godot-bin .godot-templates
          curl -L -o .godot-bin/godot.zip https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip -q .godot-bin/godot.zip -d .godot-bin
          chmod +x .godot-bin/Godot_v4.5-stable_linux.x86_64
          curl -L -o .godot-templates/templates.tpz https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/4.5.stable"
          unzip -p .godot-templates/templates.tpz templates/web_nothreads_debug.zip > "$HOME/.local/share/godot/export_templates/4.5.stable/web_nothreads_debug.zip"
          unzip -p .godot-templates/templates.tpz templates/web_nothreads_release.zip > "$HOME/.local/share/godot/export_templates/4.5.stable/web_nothreads_release.zip"

      - name: Export Web preview
        run: |
          set -euo pipefail
          mkdir -p web-build
          ./.godot-bin/Godot_v4.5-stable_linux.x86_64 --headless --path . --export-release "Web Preview" web-build/index.html

      - name: Upload Web preview to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "web-build,Dockerfile,docker-compose.yml,nginx.conf"
          target: "/opt/cat-night-watch/app"
          rm: true

      - name: Publish Docker Web preview
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/cat-night-watch/app
            docker compose up -d --build
            echo "Published Cat Night Watch Docker preview on port 9999"
